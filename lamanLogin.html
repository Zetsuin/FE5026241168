<!DOCTYPE html>
<html lang="en">

<head>
        <title>JS Popover 5026241168</title>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
        <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.slim.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
        <link rel="stylesheet" type="text/css" href="lamanLogin.css">
</head>

<body>
        <div class="kotakLogin">
                <h1 class="bikinJadiTengah">Login</h1>
                <form action="/action_page.php">
                        <div class="form-group">
                                <label for="usnm">Username</label>
                                <span class="helpIcon" data-toggle="usnm">
                                        ?
                                </span>
                                <input type="text" class="form-control" placeholder="Masukkan username" id="username">
                        </div>
                        <div class="form-group">
                                <label for="pwd">Password</label>
                                <span class="helpIcon" data-toggle="popover">
                                        ?
                                </span> 
                                <input type="password" class="form-control" placeholder="Masukkan Password" id="pwd">
                        </div>

                        <button type="submit" class="btn btn-primary">Submit</button>
                </form>

        </div>


        <script>
$(document).ready(function () {
    $('[data-toggle="popover"]').popover({
        content: "Password harus memiliki huruf unik",
        trigger: "hover"
    });
     $('[data-toggle="usnm"]').popover({
        content: "username tidak boleh sama",
        trigger: "hover",
        placement: "bottom"
    });
});

        </script>

</body>

</html>
